            themes:
                event:
                    slogan: 
                    description: |
                        ## From data to distillate: join WHISKEY-AI

                        The **WHISKEY-AI Workshop 2026** explores a new frontier at the intersection of **artificial intelligence, physical modeling, and fermentation science**. As global demand for sustainable food and beverage production grows, traditional fermentation and ageing processes face increasing pressure to become faster, more efficient, and environmentally responsible.

                        WHISKEY-AI focuses on leveraging **physics-informed machine learning and edge AI** to fundamentally rethink how we design, monitor, and optimize these processes. By embedding domain knowledge into data-driven models and deploying intelligence directly at the process edge, we can enable **real-time control, accelerated maturation, and reduced energy consumption**—without compromising product quality.

                        This workshop brings together a multidisciplinary community spanning **AI, chemical and biochemical engineering, food science, instrumentation, and industry practice**. Through technical talks and discussion, we aim to bridge theory and application, highlighting both cutting-edge research and practical deployment in fermentation-driven industries such as brewing, distilling, and alternative proteins.

                        Ultimately, WHISKEY-AI aims to catalyze a shift toward **smarter, greener, and more adaptive production systems**, where sustainability and innovation are not trade-offs, but co-optimized outcomes.
                    directions: |
                        Directions for getting to the location using public transportation. 
                        Customize this placeholder text in your Hugo configuration file or remove it if not needed.
                    # 👇 This field provides an introduction or overview about the event or organization.
                    # You can customize it to describe the event, highlight key aspects, or leave any important message.
                    # Markdown formatting is supported, allowing you to add links, bold text, and more.
                    aboutUs: |
                        The WHISKEY-AI organising committee brings together a multidisciplinary team from Imperial College London, the Technical University of Munich, and Politecnico di Milano. The committee brings deep technical expertise in artificial intelligence, chemical and biochemical engineering, sensory science, and hardware acceleration for machine learning, along with applied industry insight. Their collective focus is on advancing fermentation and ageing processes through physics-informed AI, real-time sensing, and sustainable system design, bridging cutting-edge research with practical innovation in food and beverage production.

                        ###

